name: Camilo Ghostfolio
version: "1.0.0"
upstream: "3.11.0"
slug: camilo_ghostfolio
description: Ghostfolio wealth management web app for family portfolio tracking.
url: https://github.com/camiloconcha/homeassistant-addons
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: true
stage: experimental
ports:
  3333/tcp: null
ports_description:
  3333/tcp: Optional Ghostfolio web UI port. Leave disabled when using Cloudflare Tunnel.
webui: http://[HOST]:[PORT:3333]
options:
  root_url: https://patrimonio.kmilo.cl
  postgres_host: 2effc9b9-camilo-ghostfolio-postgres
  postgres_port: 5432
  postgres_db: ghostfolio
  postgres_user: ghostfolio
  postgres_password: ""
  redis_host: 2effc9b9-camilo-ghostfolio-valkey
  redis_port: 6379
  redis_password: ""
  access_token_salt: ""
  jwt_secret_key: ""
  base_currency: CLP
schema:
  root_url: url
  postgres_host: str
  postgres_port: port
  postgres_db: str
  postgres_user: str
  postgres_password: password
  redis_host: str
  redis_port: port
  redis_password: password
  access_token_salt: password
  jwt_secret_key: password
  base_currency: str
